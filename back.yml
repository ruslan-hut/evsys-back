---

env: dev
time_zone: ${TIME_ZONE}
log_records: 5000
firebase_key: ${FIREBASE_KEY}
listen:
  type: port
  bind_ip: 127.0.0.1
  port: ${PORT}
  tls_enabled: ${TLS_ENABLED}
  cert_file: ${CERT_FILE}
  key_file: ${KEY_FILE}
central_system:
  enabled: true
  url: ${CENTRAL_SYSTEM_URL}
  token: ${CENTRAL_SYSTEM_TOKEN}
mongo:
  enabled: true
  host: ${MONGO_HOST}
  port: ${MONGO_PORT}
  user: ${MONGO_USER}
  password: ${MONGO_PASS}
  database: ${MONGO_DB}
redsys:
  enabled: ${REDSYS_ENABLED}
  disable_payment: ${REDSYS_DISABLE_PAYMENT}
  merchant_code: ${REDSYS_MERCHANT_CODE}
  terminal: ${REDSYS_TERMINAL}
  secret_key: ${REDSYS_SECRET_KEY}
  rest_api_url: ${REDSYS_REST_API_URL}
  form_url: ${REDSYS_FORM_URL}
  notify_url: ${REDSYS_NOTIFY_URL}
  currency: ${REDSYS_CURRENCY}
  api_key: ${PAYMENT_API_KEY}
brevo:
  enabled: ${BREVO_ENABLED}
  api_key: ${BREVO_API_KEY}
  sender_name: ${BREVO_SENDER_NAME}
  sender_email: ${BREVO_SENDER_EMAIL}
  api_url: ${BREVO_API_URL}